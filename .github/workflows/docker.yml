# Builds and publishes the Plaitarr container image to ghcr.io.
#
# Triggers:
#   - push to main         -> ghcr.io/<owner>/plaitarr:latest
#   - tag v*  (e.g. v0.1.0) -> :v0.1.0, :0.1, plus :latest
#   - manual run           -> via the Actions tab "Run workflow" button
#
# Multi-arch: builds for linux/amd64 (Unraid, most PCs) and linux/arm64
# (Raspberry Pi, Apple Silicon, ARM servers).
#
# Authentication uses the built-in GITHUB_TOKEN — no secrets to manage.

name: Build and push Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Opt the runner into Node.js 24 now (default starting June 2 2026). Without
# this, every run prints a deprecation warning until the cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lower-case image name
        # ghcr.io requires the image path to be lowercase. GitHub usernames can be
        # mixed-case, so we normalize here.
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
