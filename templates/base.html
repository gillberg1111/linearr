<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Linearr{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="{{ url_for('index') }}" class="brand">
        <img class="brand-mark" src="{{ url_for('static', filename='favicon.png') }}" alt="">
        <span class="brand-name">Linearr</span>
      </a>
      <nav class="topbar-actions">
        <a href="{{ url_for('new_genre') }}" class="btn">
          <span class="plus">+</span> Genre
        </a>
        <a href="{{ url_for('new_playlist') }}" class="btn btn-primary">
          <span class="plus">+</span> New Playlist
        </a>
        <a href="{{ url_for('settings') }}" class="btn btn-sm btn-ghost" style="margin-left:auto">Settings</a>
      </nav>
    </div>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, msg in messages %}
            <div class="flash flash-{{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <footer class="app-version-footer">v{{ APP_VERSION }}</footer>
</body>
</html>
